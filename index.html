    :root {

<!-- ── Service Worker 離線支援 ── -->

<script>
if ('serviceWorker' in navigator) {
    // 內嵌 SW blob，不需要外部檔案
    const swCode = `
const CACHE = 'baccarat-v6';
const ASSETS = [location.href];
self.addEventListener('install', e => {
    e.waitUntil(
        caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
    );
});
self.addEventListener('activate', e => {
    e.waitUntil(
        caches.keys().then(keys => Promise.all(
            keys.filter(k => k !== CACHE).map(k => caches.delete(k))
        )).then(() => self.clients.claim())
    );
});
self.addEventListener('fetch', e => {
    e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
        }).catch(() => caches.match(e.request)))
    );
});
`;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(() => {
        document.getElementById('offlineBadge').textContent = '● 離線就緒';
    }).catch(() => {
        document.getElementById('offlineBadge').style.color = '#f87171';
        document.getElementById('offlineBadge').textContent = '● 需連線';
    });
}
window.addEventListener('offline', () => {
    document.getElementById('offlineBadge').textContent = '● 離線中';
});
window.addEventListener('online', () => {
    document.getElementById('offlineBadge').textContent = '● 已連線';
});
</script>

<script>
// ════════════════════════════════════════════════════
//  常數 & 儲存鍵
// ════════════════════════════════════════════════════
const P1 = "17881788", P2 = "59875987";
const SK  = 'bac6_history';
const WK  = 'bac6_weights';
const PLK = 'bac6_predlog';

let history = [];
let predLog = [];   // { pred, actual, correct, index }

// ── 權重（隱藏於此，介面不外露）──
// 7 個模型，以混淆鍵名儲存
let W = { a:1.0, b:1.0, c:1.0, d:1.0, e:1.0, f:1.0, g:1.0 };
const LR = 0.09, WMN = 0.15, WMX = 3.5;
const clamp = v => Math.min(WMX, Math.max(WMN, v));

// ── 持久化 ──
function load() {
    const h = localStorage.getItem(SK);  if (h) history = JSON.parse(h);
    const w = localStorage.getItem(WK);  if (w) W = JSON.parse(w);
    const p = localStorage.getItem(PLK); if (p) predLog = JSON.parse(p);
}
function saveH() { localStorage.setItem(SK,  JSON.stringify(history)); }
function saveW() { localStorage.setItem(WK,  JSON.stringify(W)); }
function saveP() { localStorage.setItem(PLK, JSON.stringify(predLog)); }

// ════════════════════════════════════════════════════
//  解鎖
// ════════════════════════════════════════════════════
document.getElementById('unlockBtn').addEventListener('click', () => {
    document.getElementById('pwInputArea').style.display = 'flex';
    document.getElementById('pwInput').focus();
});
function tryUnlock() {
    const v = document.getElementById('pwInput').value;
    if (v === P1 || v === P2) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        updateAll();
    } else {
        document.getElementById('pwError').textContent = '❌ 密碼錯誤';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
}
document.getElementById('pwConfirmBtn').addEventListener('click', tryUnlock);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// ════════════════════════════════════════════════════
//  統計顯示
// ════════════════════════════════════════════════════
function updateStats() {
    const el = document.getElementById('statsDisplay');
    if (!history.length) { el.innerHTML = '<div class="empty-hint">尚無資料</div>'; return; }
    const total = history.length;
    const b = history.filter(h=>h.winner==='B').length;
    const p = history.filter(h=>h.winner==='P').length;
    const t = history.filter(h=>h.winner==='T').length;
    el.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center;">
            <div style="background:#c0392b22;border-radius:8px;padding:8px;border:1px solid #c0392b44;">
                <div style="font-size:1.2rem;font-weight:900;color:#e84040;">${b}</div>
                <div style="font-size:0.65rem;color:var(--muted);">莊 ${(b/total*100).toFixed(0)}%</div>
            </div>
            <div style="background:#1d6fe822;border-radius:8px;padding:8px;border:1px solid #1d6fe844;">
                <div style="font-size:1.2rem;font-weight:900;color:#3b82f6;">${p}</div>
                <div style="font-size:0.65rem;color:var(--muted);">閒 ${(p/total*100).toFixed(0)}%</div>
            </div>
            <div style="background:#16a34a22;border-radius:8px;padding:8px;border:1px solid #16a34a44;">
                <div style="font-size:1.2rem;font-weight:900;color:#22c55e;">${t}</div>
                <div style="font-size:0.65rem;color:var(--muted);">和 ${(t/total*100).toFixed(0)}%</div>
            </div>
        </div>
        <div style="margin-top:8px;font-size:0.72rem;color:var(--muted);text-align:center;">共 ${total} 局</div>
    `;
}

// ════════════════════════════════════════════════════
//  歷史列表
// ════════════════════════════════════════════════════
function updateHistoryList() {
    const el = document.getElementById('historyList');
    el.innerHTML = '';
    if (!history.length) { el.innerHTML = '<div class="empty-hint">尚無記錄</div>'; return; }
    history.forEach((h, i) => {
        const div = document.createElement('div');
        const lbl = h.winner==='B' ? '<span style="color:#e84040">🟥莊</span>'
                  : h.winner==='P' ? '<span style="color:#3b82f6">🟦閒</span>'
                  :                  '<span style="color:#22c55e">🟩和</span>';
        const log = predLog.find(p => p.index === i);
        let badge = '';
        if (log && log.actual !== null) {
            badge = log.correct
                ? ' <span style="color:#4ade80;font-size:0.75rem">✓</span>'
                : ' <span style="color:#f87171;font-size:0.75rem">✗</span>';
        }
        div.innerHTML = `<span style="color:var(--muted)">${i+1}.</span> ${lbl}${badge}`;
        el.appendChild(div);
    });
    el.scrollTop = el.scrollHeight;
}

// ════════════════════════════════════════════════════
//  大路路單
// ════════════════════════════════════════════════════
function drawBigRoad() {
    const canvas = document.getElementById('bigRoad');
    const ctx = canvas.getContext('2d');
    const W_px = canvas.width, H_px = canvas.height;
    ctx.clearRect(0, 0, W_px, H_px);

    const cell = 42;
    const maxRows = Math.floor(H_px / cell);
    const visibleCols = Math.floor(W_px / cell);

    // 建立欄
    let columns = [], cur = [];
    history.forEach(h => {
        if (h.winner === 'T') {
            if (cur.length > 0) cur[cur.length-1].tie = (cur[cur.length-1].tie || 0) + 1;
            return;
        }
        if (cur.length > 0 && cur[cur.length-1].winner === h.winner && cur.length < maxRows) {
            cur.push({winner: h.winner, tie: 0});
        } else {
            if (cur.length > 0) columns.push(cur);
            cur = [{winner: h.winner, tie: 0}];
        }
    });
    if (cur.length > 0) columns.push(cur);

    const startCol = Math.max(0, columns.length - visibleCols);
    columns.slice(startCol).forEach((col, ci) => {
        col.forEach((bead, ri) => {
            const x = ci * cell + 3, y = ri * cell + 3;
            const r = cell/2 - 3;
            const cx2 = x + r + 3, cy2 = y + r + 3;

            // 陰影
            ctx.shadowColor = bead.winner === 'B' ? '#e84040' : '#3b82f6';
            ctx.shadowBlur = 8;

            // 填色
            ctx.fillStyle = bead.winner === 'B' ? '#e84040' : '#3b82f6';
            ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;

            // 邊框
            ctx.strokeStyle = bead.winner === 'B' ? '#ff6b6b' : '#60a5fa';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI*2); ctx.stroke();

            // 文字
            ctx.fillStyle = 'white';
            ctx.font = `bold ${cell < 40 ? 13 : 15}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(bead.winner === 'B' ? '莊' : '閒', cx2, cy2);

            // 和局小標
            if (bead.tie > 0) {
                ctx.fillStyle = '#22c55e';
                ctx.font = 'bold 11px sans-serif';
                ctx.fillText(bead.tie > 1 ? String(bead.tie) : '和', cx2, cy2 + r + 7);
            }
        });
    });
}

// ════════════════════════════════════════════════════
//  ★ 預測模型（7個）
// ════════════════════════════════════════════════════

// M-A：一階馬可夫
function mA() {
    const st = ['B','P','T'];
    const mat = st.map(() => st.map(() => 0));
    for (let i = 1; i < history.length; i++)
        mat[st.indexOf(history[i-1].winner)][st.indexOf(history[i].winner)]++;
    const li = st.indexOf(history[history.length-1].winner);
    const tot = mat[li].reduce((a,b)=>a+b,0) || 1;
    return { B: mat[li][0]/tot*100, P: mat[li][1]/tot*100 };
}

// M-B：二階馬可夫（前兩筆）
function mB() {
    if (history.length < 3) return { B:50, P:50 };
    const cnt = {};
    for (let i = 2; i < history.length; i++) {
        const k = history[i-2].winner + history[i-1].winner;
        if (!cnt[k]) cnt[k] = {B:0,P:0,T:0};
        cnt[k][history[i].winner]++;
    }
    const k2 = history[history.length-2].winner + history[history.length-1].winner;
    const c = cnt[k2] || {B:1,P:1,T:0};
    const tot = c.B+c.P+c.T || 1;
    return { B: c.B/tot*100, P: c.P/tot*100 };
}

// M-C：多階序列比對
function mC() {
    let pred = {B:0,P:0};
    for (let len = 3; len <= Math.min(20, history.length-1); len++) {
        const ls = JSON.stringify(history.slice(-len).map(h=>h.winner));
        for (let i = 0; i <= history.length-len-1; i++) {
            if (JSON.stringify(history.slice(i,i+len).map(h=>h.winner)) === ls) {
                const nxt = history[i+len].winner;
                if (nxt==='B'||nxt==='P') pred[nxt] += 1/len;
            }
        }
    }
    const tot = pred.B+pred.P || 1;
    return { B: pred.B/tot*100, P: pred.P/tot*100 };
}

// M-D：長龍/打龍動態分析
function mD() {
    const nonT = history.filter(h=>h.winner!=='T');
    if (nonT.length < 2) return {B:50,P:50};
    let streak = 1, dir = nonT[nonT.length-1].winner;
    for (let i = nonT.length-2; i>=0; i--) { if(nonT[i].winner===dir) streak++; else break; }
    let fp;
    if (streak<=2) fp=0.41;
    else if (streak===3) fp=0.47;
    else if (streak===4) fp=0.53;
    else if (streak===5) fp=0.57;
    else fp=Math.min(0.62, 0.57+(streak-5)*0.01);
    return dir==='B'
        ? {B:fp*100, P:(1-fp)*100}
        : {B:(1-fp)*100, P:fp*100};
}

// M-E：莊閒平衡回歸（近30局）
function mE() {
    const r = history.slice(-30).filter(h=>h.winner!=='T');
    if (r.length < 5) return {B:50,P:50};
    const bRate = r.filter(h=>h.winner==='B').length / r.length;
    const pScore = 50 + (bRate - 0.5) * 65;
    return { B: 100-pScore, P: pScore };
}

// M-F：點差配置法
// 核心概念：追蹤近期莊/閒的「累積點差動能」
// 若連續幾局莊的累積次數明顯超出期望值 → 預測閒追回（回歸均值）
// 同時加入「動量」：若最近5局中某方 3+ 次 → 動量繼續
function mF() {
    const nonT = history.filter(h=>h.winner!=='T');
    if (nonT.length < 10) return {B:50,P:50};

    // 計算「累積偏差」= 實際莊次數 − 期望次數(0.5*n)
    const n = nonT.length;
    const bCount = nonT.filter(h=>h.winner==='B').length;
    const deviation = bCount - n * 0.5068; // 0.5068 是莊勝理論機率

    // 動量（近7局）
    const last7 = nonT.slice(-7);
    const bIn7 = last7.filter(h=>h.winner==='B').length;
    const momentum = (bIn7 / 7 - 0.5) * 2; // -1 ~ +1

    // 點差修正：偏差愈大 → 另一方回歸力愈強
    const correctionForce = Math.tanh(deviation / 8) * 20; // 最大±20分
    const momentumBonus   = momentum * 15;                  // 最大±15分

    // 合成：基礎50 + 動量 − 回歸力（偏差大時壓制強勢方）
    const scoreB = 50 + momentumBonus - correctionForce;
    const scoreP = 100 - scoreB;
    return { B: Math.min(80, Math.max(20, scoreB)), P: Math.min(80, Math.max(20, scoreP)) };
}

// M-G：熱區掃描（近20局高頻模式）
// 找出最近20局中最常出現的2~4筆序列，用其後繼結果投票
function mG() {
    const win = history.slice(-20);
    if (win.length < 6) return {B:50,P:50};
    let votes = {B:0, P:0};
    for (let len = 2; len <= 4; len++) {
        const pat = JSON.stringify(win.slice(-len).map(h=>h.winner));
        let freq = 0, bVote = 0, pVote = 0;
        for (let i = 0; i <= win.length-len-1; i++) {
            if (JSON.stringify(win.slice(i,i+len).map(h=>h.winner)) === pat) {
                freq++;
                const nxt = win[i+len].winner;
                if (nxt==='B') bVote++;
                if (nxt==='P') pVote++;
            }
        }
        if (freq >= 2) {
            const w = freq * len;
            votes.B += bVote * w;
            votes.P += pVote * w;
        }
    }
    const tot = votes.B + votes.P || 1;
    return { B: votes.B/tot*100, P: votes.P/tot*100 };
}

// ── 各模型對應權重鍵
const MODEL_KEYS = ['a','b','c','d','e','f','g'];
const MODEL_FNS  = [mA, mB, mC, mD, mE, mF, mG];

// ════════════════════════════════════════════════════
//  自適應學習
// ════════════════════════════════════════════════════
function learn(actual) {
    if (!predLog.length) return;
    const last = predLog[predLog.length-1];
    if (last.actual !== null) return;
    last.actual  = actual;
    last.correct = (last.pred === actual);
    last.index   = history.length - 1;
    MODEL_KEYS.forEach((k, i) => {
        const vote = last.votes[i]; // 'B' or 'P'
        if (!vote) return;
        W[k] = clamp(vote === actual ? W[k] + LR : W[k] - LR);
    });
    saveW(); saveP();
}

// ════════════════════════════════════════════════════
//  主預測
// ════════════════════════════════════════════════════
function showPrediction() {
    const el = document.getElementById('predMain');
    if (history.length < 20) {
        const pct = (history.length/20*100).toFixed(0);
        el.innerHTML = `
            <div class="waiting">
                <div style="font-size:2rem;margin-bottom:8px;">📊</div>
                <div style="color:var(--muted);font-size:0.9rem;">累積資料中…</div>
                <div class="progress-wrap">
                    <div class="progress-fill" style="width:${pct}%"></div>
                </div>
                <div style="font-size:0.8rem;color:var(--muted);">${history.length} / 20 筆</div>
            </div>`;
        return;
    }

    // 計算各模型結果
    const results = MODEL_FNS.map(fn => fn());
    const votes   = results.map(r => r.B >= r.P ? 'B' : 'P');

    // 加權融合
    let wTot = MODEL_KEYS.reduce((s,k) => s+W[k], 0);
    let scoreB = 0, scoreP = 0;
    results.forEach((r, i) => {
        const w = W[MODEL_KEYS[i]];
        scoreB += r.B * w;
        scoreP += r.P * w;
    });
    const tot   = scoreB + scoreP;
    const probB = scoreB / tot * 100;
    const probP = scoreP / tot * 100;

    const finalPred = probB >= probP ? 'B' : 'P';
    const conf = Math.max(probB, probP);

    // 記錄本次預測
    predLog.push({ pred: finalPred, actual: null, votes, index: null });
    saveP();

    // 統計
    const judged = predLog.filter(p => p.actual !== null && (p.actual==='B'||p.actual==='P'));
    const hits   = judged.filter(p=>p.correct).length;
    const accPct = judged.length > 0 ? (hits/judged.length*100).toFixed(1) : '--';
    const recent10 = judged.slice(-10);

    // 風險
    const riskClass = conf < 54 ? 'risk-high' : conf < 58 ? 'risk-mid' : 'risk-low';
    const riskText  = conf < 54 ? '⚠ 高風險・建議停手'
                    : conf < 58 ? '● 中風險・小額試試'
                    :             '✦ 低風險・可跟';

    // 命中點
    const dots = recent10.map(p =>
        `<div class="hit-dot ${p.correct?'y':'n'}">${p.correct?'✓':'✗'}</div>`
    ).join('');

    // 連勝條
    const streak = (() => {
        const nonT = history.filter(h=>h.winner!=='T');
        if (!nonT.length) return {n:0,d:'-'};
        let n=1, d=nonT[nonT.length-1].winner;
        for(let i=nonT.length-2;i>=0;i--){if(nonT[i].winner===d)n++;else break;}
        return {n,d};
    })();

    el.innerHTML = `
        <div class="pred-result ${finalPred==='B'?'banker':'player'}">
            ${finalPred==='B'?'🟥 莊勝':'🟦 閒勝'}
        </div>

        <div class="prob-row">
            <div class="prob-box ${finalPred==='B'?'active-b':''}">
                <div class="pct" style="color:var(--red)">${probB.toFixed(1)}%</div>
                <div class="lbl">莊 BANKER</div>
            </div>
            <div class="prob-box ${finalPred==='P'?'active-p':''}">
                <div class="pct" style="color:var(--blue)">${probP.toFixed(1)}%</div>
                <div class="lbl">閒 PLAYER</div>
            </div>
        </div>

        <div class="confidence-bar-wrap">
            <div class="conf-label">
                <span>信心度</span>
                <span style="color:var(--gold)">${conf.toFixed(1)}%</span>
            </div>
            <div class="conf-track">
                <div class="conf-fill ${finalPred==='B'?'banker':'player'}" style="width:${conf}%"></div>
            </div>
        </div>

        <div style="text-align:center;">
            <span class="risk-badge ${riskClass}">${riskText}</span>
        </div>

        <div style="margin-top:10px;font-size:0.78rem;color:var(--muted);">
            連${streak.d==='B'?'莊':streak.d==='P'?'閒':'和'} ${streak.n} 局
        </div>

        <div class="stat-row">
            <div class="stat-box">
                <div class="val">${accPct}%</div>
                <div class="key">累計命中率</div>
            </div>
            <div class="stat-box">
                <div class="val">${hits}</div>
                <div class="key">命中次數</div>
            </div>
            <div class="stat-box">
                <div class="val">${judged.length}</div>
                <div class="key">有效預測</div>
            </div>
        </div>

        <div style="margin-top:10px;">
            <div style="font-size:0.7rem;color:var(--muted);margin-bottom:6px;">近10次 ▸</div>
            <div class="hit-row">${dots || '<span style="color:var(--muted);font-size:0.8rem">尚無紀錄</span>'}</div>
        </div>
    `;
}

// ════════════════════════════════════════════════════
//  全更新
// ════════════════════════════════════════════════════
function updateAll() {
    updateStats();
    updateHistoryList();
    drawBigRoad();
    showPrediction();
}

// ════════════════════════════════════════════════════
//  開牌（先學習再新增）
// ════════════════════════════════════════════════════
function addHand(winner) {
    if (winner !== 'T') learn(winner);
    history.push({ winner });
    saveH();
    updateAll();
}
function undoLast() {
    if (!history.length) return;
    history.pop();
    if (predLog.length && predLog[predLog.length-1].actual === null) predLog.pop();
    saveH(); saveP(); updateAll();
}
function clearAll() {
    if (!confirm('確定清空所有歷史及學習紀錄？')) return;
    history = []; predLog = [];
    W = { a:1.0, b:1.0, c:1.0, d:1.0, e:1.0, f:1.0, g:1.0 };
    saveH(); saveW(); saveP(); updateAll();
}

document.getElementById('btnB').addEventListener('click', () => addHand('B'));
document.getElementById('btnP').addEventListener('click', () => addHand('P'));
document.getElementById('btnT').addEventListener('click', () => addHand('T'));
document.getElementById('btnUndo').addEventListener('click', undoLast);
document.getElementById('btnClear').addEventListener('click', clearAll);

load();
</script>
