<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百家樂趨勢分析V5</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 2.5rem; color: #facc15; margin-bottom: 20px; }
        .card { background: #1f2937; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        button { width: 100%; padding: 18px; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 12px; margin-bottom: 10px; transition: all 0.2s; cursor: pointer; }
        button:active { transform: scale(0.95); }
        .btn-b { background: #ef4444; color: white; }
        .btn-p { background: #3b82f6; color: white; }
        .btn-t { background: #22c55e; color: white; }
        #unlockBtn { background: #eab308; color: #111827; font-size: 1.6rem; font-weight: bold; }
        canvas { background: #27272a; border-radius: 12px; }
        #prediction { min-height: 380px; width: 100%; background: #1f2937; border-radius: 16px; padding: 35px; font-size: 1.4rem; line-height: 1.9; box-sizing: border-box; }
        #pwInputArea { margin-top: 20px; display: none; flex-direction: column; align-items: center; gap: 12px; }
        #pwInput { width: 80%; max-width: 320px; padding: 14px 18px; font-size: 1.4rem; border-radius: 10px; border: 2px solid #eab308; background: #111827; color: white; text-align: center; letter-spacing: 4px; outline: none; box-sizing: border-box; }
        #pwConfirmBtn { width: 80%; max-width: 320px; background: #16a34a; color: white; padding: 14px; font-size: 1.3rem; }
        #pwError { color: #f87171; font-size: 1.1rem; min-height: 1.5rem; }
        .weight-bar { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 0.95rem; }
        .weight-fill { height: 10px; border-radius: 5px; background: #facc15; transition: width 0.4s; }
        .weight-track { flex:1; background: #374151; border-radius: 5px; height: 10px; overflow: hidden; }
        .hit-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 1rem; font-weight: bold; margin-left: 8px; }
        .hit-y { background: #16a34a; }
        .hit-n { background: #dc2626; }
    </style>
</head>
<body>
<div class="container">
    <h1>百家樂趨勢分析V5</h1>

    <!-- 解鎖畫面 -->
    <div id="lockScreen" class="card" style="text-align:center; padding:40px;">
        <h2>程式已鎖定</h2>
        <p style="margin:20px 0;">點擊下方按鈕輸入密碼後才能使用</p>
        <button id="unlockBtn">🔓 輸入密碼解鎖</button>
        <div id="pwInputArea">
            <input id="pwInput" type="password" placeholder="請輸入密碼" maxlength="20" />
            <button id="pwConfirmBtn">✅ 確認</button>
            <div id="pwError"></div>
        </div>
    </div>

    <!-- 主內容 -->
    <div id="mainContent" style="display:none;">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
            <div class="card">
                <h2 style="margin-bottom:15px;">點擊直接新增開牌</h2>
                <button id="btnB" class="btn-b">莊</button>
                <button id="btnP" class="btn-p">閒</button>
                <button id="btnT" class="btn-t">和</button>
                <div style="margin-top:25px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button id="btnUndo" style="background:#4b5563;">↩ 刪除上一筆</button>
                    <button id="btnClear" style="background:#f59e0b;">🗑 清空全部</button>
                </div>
            </div>
            <div class="card">
                <h2>開牌歷史</h2>
                <div id="historyList" style="background:#111827; padding:15px; height:220px; overflow-y:auto; border-radius:12px; margin-bottom:20px; font-family:monospace;"></div>
                <h2>大路路單</h2>
                <canvas id="bigRoad" width="720" height="300"></canvas>
            </div>
        </div>

        <!-- 預測區 -->
        <div class="card">
            <h2>🔮 自適應 AI 預測（20筆以上）</h2>
            <div id="prediction"></div>
        </div>

        <!-- 學習狀態區 -->
        <div class="card" id="learningCard" style="display:none;">
            <h2>🧠 模型學習狀態</h2>
            <div id="weightDisplay"></div>
            <div style="margin-top:15px; font-size:1rem; color:#9ca3af;">
                近10次命中：<span id="recentHits"></span>
            </div>
            <div style="margin-top:5px; font-size:1rem; color:#9ca3af;">
                累計命中率：<span id="totalAccDisplay" style="color:#facc15;"></span>
            </div>
        </div>
    </div>
</div>

<script>
const PASSWORD1 = "17881788";
const PASSWORD2 = "59875987";

const STORAGE_KEY   = 'baccaratHistory';
const WEIGHTS_KEY   = 'baccaratWeights';
const PRED_LOG_KEY  = 'baccaratPredLog';

let history  = [];
let predLog  = [];   // {pred, actual, correct}[]

// 五個模型權重，初始相等，會隨對錯自動學習
let weights = { markov: 1.0, markov2: 1.0, multi: 1.0, streak: 1.0, balance: 1.0 };

// ── 持久化 ──────────────────────────────────────────
function loadData() {
    const h = localStorage.getItem(STORAGE_KEY);
    if (h) history = JSON.parse(h);
    const w = localStorage.getItem(WEIGHTS_KEY);
    if (w) weights = JSON.parse(w);
    const p = localStorage.getItem(PRED_LOG_KEY);
    if (p) predLog = JSON.parse(p);
}
function saveData()    { localStorage.setItem(STORAGE_KEY,  JSON.stringify(history)); }
function saveWeights() { localStorage.setItem(WEIGHTS_KEY,  JSON.stringify(weights)); }
function savePredLog() { localStorage.setItem(PRED_LOG_KEY, JSON.stringify(predLog)); }

// ── 解鎖 ────────────────────────────────────────────
document.getElementById('unlockBtn').addEventListener('click', () => {
    document.getElementById('pwInputArea').style.display = 'flex';
    document.getElementById('pwInput').focus();
});
function tryUnlock() {
    const val = document.getElementById('pwInput').value;
    if (val === PASSWORD1 || val === PASSWORD2) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        updateAll();
    } else {
        document.getElementById('pwError').textContent = '❌ 密碼錯誤，請再試一次';
        document.getElementById('pwInput').value = '';
        document.getElementById('pwInput').focus();
    }
}
document.getElementById('pwConfirmBtn').addEventListener('click', tryUnlock);
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

// ── 歷史列表 ─────────────────────────────────────────
function updateHistoryList() {
    const list = document.getElementById('historyList');
    list.innerHTML = '';
    history.forEach((h, i) => {
        const div = document.createElement('div');
        const label = h.winner === 'B' ? '🟥莊' : h.winner === 'P' ? '🟦閒' : '🟩和';
        // 顯示該筆對應預測是否命中
        const log = predLog.find(p => p.index === i);
        let badge = '';
        if (log) badge = log.correct ? ' <span style="color:#4ade80">✓</span>' : ' <span style="color:#f87171">✗</span>';
        div.innerHTML = `${i+1}. ${label}${badge}`;
        list.appendChild(div);
    });
    list.scrollTop = list.scrollHeight;
}

// ── 大路路單 ─────────────────────────────────────────
function drawBigRoad() {
    const canvas = document.getElementById('bigRoad');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cell = 48;
    const visibleCols = Math.floor(canvas.width / cell);
    let columns = [], currentCol = [];
    history.forEach(h => {
        if (h.winner === 'T') {
            if (currentCol.length > 0) currentCol[currentCol.length-1].tie = (currentCol[currentCol.length-1].tie || 0) + 1;
            return;
        }
        if (currentCol.length > 0 && currentCol[currentCol.length-1].winner === h.winner && currentCol.length < 6) {
            currentCol.push({winner: h.winner, tie: 0});
        } else {
            if (currentCol.length > 0) columns.push(currentCol);
            currentCol = [{winner: h.winner, tie: 0}];
        }
    });
    if (currentCol.length > 0) columns.push(currentCol);
    const startCol = Math.max(0, columns.length - visibleCols);
    columns.slice(startCol).forEach((col, colIdx) => {
        col.forEach((bead, rowIdx) => {
            const x = colIdx * cell + 6, y = rowIdx * cell + 6;
            ctx.fillStyle = bead.winner === 'B' ? '#ef4444' : '#3b82f6';
            ctx.beginPath(); ctx.arc(x+18, y+18, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
            ctx.fillText(bead.winner === 'B' ? '莊' : '閒', x+18, y+27);
            if (bead.tie > 0) {
                ctx.fillStyle = '#22c55e'; ctx.font = 'bold 16px Arial';
                ctx.fillText(bead.tie > 1 ? bead.tie : '和', x+18, y+42);
            }
        });
    });
}

// ══════════════════════════════════════════════════
//  預測引擎
// ══════════════════════════════════════════════════

// 模型1：一階馬可夫
function modelMarkov1() {
    const states = ['B','P','T'];
    const mat = states.map(() => states.map(() => 0));
    for (let i = 1; i < history.length; i++) {
        mat[states.indexOf(history[i-1].winner)][states.indexOf(history[i].winner)]++;
    }
    const last = states.indexOf(history[history.length-1].winner);
    const tot  = mat[last].reduce((a,b)=>a+b,0) || 1;
    return { B: mat[last][0]/tot*100, P: mat[last][1]/tot*100 };
}

// 模型2：二階馬可夫（前兩筆）
function modelMarkov2() {
    if (history.length < 3) return { B: 50, P: 50 };
    const key = h => h.winner;
    const counts = {};
    for (let i = 2; i < history.length; i++) {
        const k = key(history[i-2]) + key(history[i-1]);
        if (!counts[k]) counts[k] = { B:0, P:0, T:0 };
        counts[k][history[i].winner]++;
    }
    const k2 = key(history[history.length-2]) + key(history[history.length-1]);
    const c  = counts[k2] || { B:1, P:1, T:0 };
    const tot = c.B + c.P + c.T || 1;
    return { B: c.B/tot*100, P: c.P/tot*100 };
}

// 模型3：多階序列比對
function modelMultiSeq() {
    let pred = { B:0, P:0 };
    for (let len = 3; len <= Math.min(20, history.length-1); len++) {
        const lastSeq = JSON.stringify(history.slice(-len).map(h=>h.winner));
        for (let i = 0; i <= history.length-len-1; i++) {
            if (JSON.stringify(history.slice(i,i+len).map(h=>h.winner)) === lastSeq) {
                const next = history[i+len].winner;
                if (next === 'B' || next === 'P') pred[next] += 1/len;
            }
        }
    }
    const tot = pred.B + pred.P || 1;
    return { B: pred.B/tot*100, P: pred.P/tot*100 };
}

// 模型4：長龍 / 打龍分析
function modelStreak() {
    const nonT = history.filter(h => h.winner !== 'T');
    if (nonT.length < 2) return { B: 50, P: 50 };
    let streak = 1, dir = nonT[nonT.length-1].winner;
    for (let i = nonT.length-2; i >= 0; i--) {
        if (nonT[i].winner === dir) streak++; else break;
    }
    // 龍長 <= 3：打龍傾向；龍長 > 3：跟龍傾向（但逐漸回落）
    let followProb;
    if (streak <= 2) followProb = 0.42;
    else if (streak === 3) followProb = 0.48;
    else if (streak === 4) followProb = 0.52;
    else if (streak === 5) followProb = 0.55;
    else followProb = Math.min(0.60, 0.55 + (streak-5)*0.01);
    const followScore = followProb * 100;
    return dir === 'B'
        ? { B: followScore, P: 100-followScore }
        : { B: 100-followScore, P: followScore };
}

// 模型5：莊閒平衡回歸
function modelBalance() {
    const recent = history.slice(-30).filter(h => h.winner !== 'T');
    if (recent.length < 5) return { B: 50, P: 50 };
    const bRate = recent.filter(h => h.winner === 'B').length / recent.length;
    // 若莊出太多 → 閒機率上升，反之亦然
    const pScore = 50 + (bRate - 0.5) * 60;
    return { B: 100 - pScore, P: pScore };
}

// ══════════════════════════════════════════════════
//  自適應學習：比對上次預測 vs 實際結果，更新權重
// ══════════════════════════════════════════════════
function learnFromLastResult(actual) {
    if (predLog.length === 0) return;
    const last = predLog[predLog.length - 1];
    if (last.actual !== null) return; // 已經學過

    last.actual  = actual;
    last.correct = (last.pred === actual);
    last.index   = history.length - 1;

    const LR = 0.08; // 學習率
    const MIN_W = 0.2, MAX_W = 3.0;
    const clamp = v => Math.min(MAX_W, Math.max(MIN_W, v));

    // 每個模型各自對/錯都做調整
    ['markov','markov2','multi','streak','balance'].forEach(m => {
        const modelVote = last.modelVotes[m]; // 'B' or 'P'
        if (!modelVote) return;
        if (modelVote === actual) {
            weights[m] = clamp(weights[m] + LR);
        } else {
            weights[m] = clamp(weights[m] - LR);
        }
    });

    saveWeights();
    savePredLog();
}

// ══════════════════════════════════════════════════
//  主預測函式
// ══════════════════════════════════════════════════
let lastPrediction = null; // 暫存供學習用

function showPrediction() {
    const predDiv = document.getElementById('prediction');
    if (history.length < 20) {
        predDiv.innerHTML = `<span style="color:#fcd34d;">需要20筆以上資料<br>目前 ${history.length} 筆</span>`;
        document.getElementById('learningCard').style.display = 'none';
        return;
    }

    const m1 = modelMarkov1();
    const m2 = modelMarkov2();
    const m3 = modelMultiSeq();
    const m4 = modelStreak();
    const m5 = modelBalance();

    // 各模型本輪投票
    const modelVotes = {
        markov:  m1.B >= m1.P ? 'B' : 'P',
        markov2: m2.B >= m2.P ? 'B' : 'P',
        multi:   m3.B >= m3.P ? 'B' : 'P',
        streak:  m4.B >= m4.P ? 'B' : 'P',
        balance: m5.B >= m5.P ? 'B' : 'P',
    };

    const wTotal = weights.markov + weights.markov2 + weights.multi + weights.streak + weights.balance;
    const scoreB =
        m1.B * weights.markov   +
        m2.B * weights.markov2  +
        m3.B * weights.multi    +
        m4.B * weights.streak   +
        m5.B * weights.balance;
    const scoreP =
        m1.P * weights.markov   +
        m2.P * weights.markov2  +
        m3.P * weights.multi    +
        m4.P * weights.streak   +
        m5.P * weights.balance;

    const totalScore = scoreB + scoreP;
    const probB = scoreB / totalScore * 100;
    const probP = scoreP / totalScore * 100;

    const finalPred = probB >= probP ? 'B' : 'P';
    const confidence = Math.max(probB, probP);
    const finalName  = finalPred === 'B' ? '🟥 莊勝' : '🟦 閒勝';
    const risk = confidence < 54 ? '⚠️ 高風險 - 建議停手'
               : confidence < 58 ? '🟡 中風險 - 小額試試'
               : '🟢 低風險 - 可跟';

    // 記錄本次預測（actual 等開牌後填入）
    lastPrediction = { pred: finalPred, actual: null, modelVotes };
    predLog.push(lastPrediction);
    savePredLog();

    // 計算命中率統計
    const judged = predLog.filter(p => p.actual !== null && (p.actual === 'B' || p.actual === 'P'));
    const hits   = judged.filter(p => p.correct).length;
    const accPct = judged.length > 0 ? (hits / judged.length * 100).toFixed(1) : '--';

    predDiv.innerHTML = `
        <div style="font-size:2.8rem; margin-bottom:10px;">${finalName}</div>
        <div style="font-size:1.8rem; color:#facc15;">信心度 ${confidence.toFixed(1)}%</div>
        <div style="margin-top:20px; font-size:1.05rem; line-height:1.9; color:#d1d5db;">
            一階馬可夫：莊 ${m1.B.toFixed(1)}% | 閒 ${m1.P.toFixed(1)}%<br>
            二階馬可夫：莊 ${m2.B.toFixed(1)}% | 閒 ${m2.P.toFixed(1)}%<br>
            多階序列：&nbsp;&nbsp;莊 ${m3.B.toFixed(1)}% | 閒 ${m3.P.toFixed(1)}%<br>
            長龍分析：&nbsp;&nbsp;莊 ${m4.B.toFixed(1)}% | 閒 ${m4.P.toFixed(1)}%<br>
            平衡回歸：&nbsp;&nbsp;莊 ${m5.B.toFixed(1)}% | 閒 ${m5.P.toFixed(1)}%<br>
        </div>
        <div style="margin-top:15px; font-size:1.2rem;">${risk}</div>
        <div style="margin-top:10px; font-size:1rem; color:#9ca3af;">累計命中率：<span style="color:#facc15;">${accPct}%</span>（共 ${judged.length} 筆有效預測）</div>
    `;

    updateWeightDisplay(modelVotes);
    document.getElementById('learningCard').style.display = 'block';
}

// ── 權重儀表板 ────────────────────────────────────
function updateWeightDisplay(votes) {
    const names = { markov:'一階馬可夫', markov2:'二階馬可夫', multi:'多階序列', streak:'長龍分析', balance:'平衡回歸' };
    const maxW = 3.0;
    let html = '';
    Object.keys(weights).forEach(k => {
        const pct = (weights[k] / maxW * 100).toFixed(0);
        const vote = votes ? (votes[k] === 'B' ? '🟥' : '🟦') : '';
        html += `
        <div class="weight-bar">
            <span style="width:90px;color:#e5e7eb;">${names[k]}</span>
            <div class="weight-track"><div class="weight-fill" style="width:${pct}%"></div></div>
            <span style="width:44px;color:#facc15;">${weights[k].toFixed(2)}</span>
            <span>${vote}</span>
        </div>`;
    });
    document.getElementById('weightDisplay').innerHTML = html;

    // 近10次命中
    const judged = predLog.filter(p => p.actual !== null && (p.actual === 'B' || p.actual === 'P')).slice(-10);
    const badges = judged.map(p =>
        `<span class="hit-badge ${p.correct ? 'hit-y' : 'hit-n'}">${p.correct ? '✓' : '✗'}</span>`
    ).join(' ');
    document.getElementById('recentHits').innerHTML = badges || '尚無紀錄';

    const all = predLog.filter(p => p.actual !== null && (p.actual === 'B' || p.actual === 'P'));
    const acc = all.length > 0 ? (all.filter(p=>p.correct).length / all.length * 100).toFixed(1) : '--';
    document.getElementById('totalAccDisplay').textContent = `${acc}%（${all.length} 筆）`;
}

// ── 主更新 ───────────────────────────────────────
function updateAll() {
    updateHistoryList();
    drawBigRoad();
    showPrediction();
}

// ── 開牌（先學習，再更新）────────────────────────
function addHand(winner) {
    // 先用這筆結果回饋給上一次預測學習
    if (winner !== 'T') learnFromLastResult(winner);
    history.push({ winner });
    saveData();
    updateAll();
}

function undoLast() {
    if (!history.length) return;
    history.pop();
    if (predLog.length > 0 && predLog[predLog.length-1].actual === null) predLog.pop();
    saveData(); savePredLog(); updateAll();
}

function clearAll() {
    if (!confirm('確定清空所有歷史及學習紀錄？')) return;
    history = []; predLog = [];
    weights = { markov:1.0, markov2:1.0, multi:1.0, streak:1.0, balance:1.0 };
    saveData(); saveWeights(); savePredLog();
    updateAll();
}

document.getElementById('btnB').addEventListener('click', () => addHand('B'));
document.getElementById('btnP').addEventListener('click', () => addHand('P'));
document.getElementById('btnT').addEventListener('click', () => addHand('T'));
document.getElementById('btnUndo').addEventListener('click', undoLast);
document.getElementById('btnClear').addEventListener('click', clearAll);

loadData();
</script>
</body>
</html>
