<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百家樂趨勢分析V7 Pro</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: system-ui; background:#111827; color:white; margin:0;}
.container { max-width:1100px; margin:auto; padding:20px;}
h1 { text-align:center; color:#facc15;}
.card { background:#1f2937; border-radius:16px; padding:20px; margin-bottom:20px;}
button { width:100%; padding:18px; font-size:1.5rem; border:none; border-radius:12px; margin-bottom:10px;}
.btn-b{background:#ef4444;} .btn-p{background:#3b82f6;} .btn-t{background:#22c55e;}
#unlockBtn{background:#eab308;color:#111827;}
canvas{background:#27272a;border-radius:12px;}
#prediction{min-height:380px;background:#1f2937;padding:30px;border-radius:16px;}
</style>
</head>

<body>
<div class="container">
<h1>百家樂趨勢分析 V7 Pro</h1>

<!-- 解鎖 -->
<div id="lockScreen" class="card" style="text-align:center;">
<h2>🔒 系統鎖定</h2>
<input id="keyInput" placeholder="輸入授權碼" style="padding:12px;width:80%;font-size:16px;">
<button id="unlockBtn">解鎖</button>
</div>

<!-- 主內容 -->
<div id="mainContent" style="display:none;">

<div style="display:grid;grid-template-columns:1fr 2fr;gap:20px;">
<div class="card">
<h2>新增開牌</h2>
<button id="btnB" class="btn-b">莊</button>
<button id="btnP" class="btn-p">閒</button>
<button id="btnT" class="btn-t">和</button>

<button id="btnUndo">刪除</button>
<button id="btnClear">清空</button>
</div>

<div class="card">
<h2>歷史</h2>
<div id="historyList" style="height:220px;overflow:auto;background:#111827;"></div>
<canvas id="bigRoad" width="720" height="300"></canvas>
</div>
</div>

<div class="card">
<h2>AI 預測</h2>
<div id="prediction"></div>
</div>

</div>
</div>

<script>

// ===== 卡密（你改這裡就好）=====
const VALID_KEYS = ["VIP123","VIP456","VIP789"];

// ===== 驗證 =====
function unlockApp(){
    const input=document.getElementById("keyInput").value.trim();

    if(VALID_KEYS.includes(input)){
        localStorage.setItem("license",input);
        startApp();
    }else{
        alert("授權碼錯誤");
    }
}

function checkLicense(){
    const key=localStorage.getItem("license");
    return VALID_KEYS.includes(key);
}

function startApp(){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("mainContent").style.display="block";
}

// ===== 原本功能（幾乎不動）=====
let history=[];
const STORAGE_KEY='baccaratHistory';

function loadData(){
    const s=localStorage.getItem(STORAGE_KEY);
    if(s) history=JSON.parse(s);
}

function saveData(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(history));
}

function updateHistoryList(){
    const list=document.getElementById('historyList');
    list.innerHTML="";
    history.forEach((h,i)=>{
        const d=document.createElement("div");
        d.textContent=(i+1)+"."+h.winner;
        list.appendChild(d);
    });
}

function drawBigRoad(){}

// ===== AI（簡化穩定版）=====
function showPrediction(){

    const div=document.getElementById("prediction");

    if(history.length<20){
        div.innerHTML="需要20筆資料";
        return;
    }

    let b=0,p=0;

    history.forEach(h=>{
        if(h.winner==="B")b++;
        if(h.winner==="P")p++;
    });

    let pred=b>p?"B":"P";

    div.innerHTML=
    (pred==="B"?"🟥莊":"🟦閒")+
    "<br>資料量："+history.length;
}

function updateAll(){
    updateHistoryList();
    drawBigRoad();
    showPrediction();
}

function addHand(w){
    history.push({winner:w});
    saveData();
    updateAll();
}

function undoLast(){
    history.pop();
    saveData();
    updateAll();
}

function clearAll(){
    history=[];
    saveData();
    updateAll();
}

// ===== 初始化 =====
document.getElementById("unlockBtn").onclick=unlockApp;
document.getElementById("btnB").onclick=()=>addHand("B");
document.getElementById("btnP").onclick=()=>addHand("P");
document.getElementById("btnT").onclick=()=>addHand("T");
document.getElementById("btnUndo").onclick=undoLast;
document.getElementById("btnClear").onclick=clearAll;

loadData();

if(checkLicense()) startApp();

// ===== PWA =====
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}

</script>
</body>
</html>
