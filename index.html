<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百家樂趨勢分析V4</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #111827; color: white; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-size: 2.5rem; color: #facc15; margin-bottom: 20px; }
        .card { background: #1f2937; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        button { width: 100%; padding: 18px; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 12px; margin-bottom: 10px; transition: all 0.2s; cursor: pointer; }
        button:active { transform: scale(0.95); }
        .btn-b { background: #ef4444; }
        .btn-p { background: #3b82f6; }
        .btn-t { background: #22c55e; }
        #unlockBtn { background: #eab308; color: #111827; font-size: 1.6rem; font-weight: bold; }
        .debug { font-size: 0.9rem; color: #9ca3af; margin-top: 15px; }
        canvas { background: #27272a; border-radius: 12px; }
        #prediction { min-height: 380px; width: 100%; background: #1f2937; border-radius: 16px; padding: 35px; font-size: 1.4rem; line-height: 1.9; box-sizing: border-box; }

        /* 密碼輸入區 */
        #pwInputArea { margin-top: 20px; display: none; flex-direction: column; align-items: center; gap: 12px; }
        #pwInput {
            width: 80%; max-width: 320px;
            padding: 14px 18px;
            font-size: 1.4rem;
            border-radius: 10px;
            border: 2px solid #eab308;
            background: #111827;
            color: white;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            box-sizing: border-box;
        }
        #pwConfirmBtn {
            width: 80%; max-width: 320px;
            background: #16a34a;
            color: white;
            padding: 14px;
            font-size: 1.3rem;
        }
        #pwError { color: #f87171; font-size: 1.1rem; min-height: 1.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>百家樂趨勢分析V4</h1>

        <!-- 解鎖畫面 -->
        <div id="lockScreen" class="card" style="text-align:center; padding:40px;">
            <h2>程式已鎖定</h2>
            <p style="margin:20px 0;">點擊下方按鈕輸入密碼後才能使用</p>
            <button id="unlockBtn">🔓 輸入密碼解鎖</button>

            <div id="pwInputArea">
                <input id="pwInput" type="password" placeholder="請輸入密碼" maxlength="20" />
                <button id="pwConfirmBtn">✅ 確認</button>
                <div id="pwError"></div>
            </div>
        </div>

        <!-- 主內容（預設隱藏） -->
        <div id="mainContent" style="display:none;">
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px;">
                <div class="card">
                    <h2 style="margin-bottom:15px;">點擊直接新增開牌</h2>
                    <button id="btnB" class="btn-b">莊</button>
                    <button id="btnP" class="btn-p">閒</button>
                    <button id="btnT" class="btn-t">和</button>

                    <div style="margin-top:25px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button id="btnUndo" style="background:#4b5563;">↩ 刪除上一筆</button>
                        <button id="btnClear" style="background:#f59e0b;">🗑 清空全部</button>
                    </div>
                </div>

                <div class="card">
                    <h2>開牌歷史</h2>
                    <div id="historyList" style="background:#111827; padding:15px; height:220px; overflow-y:auto; border-radius:12px; margin-bottom:20px; font-family:monospace;"></div>
                    <h2>大路路單</h2>
                    <canvas id="bigRoad" width="720" height="300"></canvas>
                </div>
            </div>

            <div class="card">
                <h2>🔮 自適應 AI 預測（20筆以上）</h2>
                <div id="prediction"></div>
                <div id="debug" class="debug"></div>
            </div>
        </div>
    </div>

    <script>
        const PASSWORD1 = "17881788";
        const PASSWORD2 = "59875987";

        let history = [];
        let markovAcc = 0.5, multiAcc = 0.5, streakAcc = 0.5, pairTendAcc = 0.5, jumpAcc = 0.5;
        const STORAGE_KEY = 'baccaratHistory';

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) history = JSON.parse(saved);
        }
        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        // ── 解鎖邏輯（自訂 UI，不用 prompt）──
        document.getElementById('unlockBtn').addEventListener('click', () => {
            const area = document.getElementById('pwInputArea');
            area.style.display = 'flex';
            document.getElementById('pwInput').focus();
        });

        function tryUnlock() {
            const val = document.getElementById('pwInput').value;
            if (val === PASSWORD1 || val === PASSWORD2) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                updateAll();
            } else {
                document.getElementById('pwError').textContent = '❌ 密碼錯誤，請再試一次';
                document.getElementById('pwInput').value = '';
                document.getElementById('pwInput').focus();
            }
        }

        document.getElementById('pwConfirmBtn').addEventListener('click', tryUnlock);
        document.getElementById('pwInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') tryUnlock();
        });

        // ── 主功能 ──
        function updateHistoryList() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.forEach((h, i) => {
                const div = document.createElement('div');
                div.textContent = `${i+1}. ${h.winner === 'B' ? '🟥莊' : h.winner === 'P' ? '🟦閒' : '🟩和'}`;
                list.appendChild(div);
            });
            list.scrollTop = list.scrollHeight;
        }

        function drawBigRoad() {
            const canvas = document.getElementById('bigRoad');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cell = 48;
            const visibleCols = Math.floor(canvas.width / cell);
            let columns = [], currentCol = [];
            history.forEach(h => {
                if (h.winner === 'T') {
                    if (currentCol.length > 0) currentCol[currentCol.length-1].tie = (currentCol[currentCol.length-1].tie || 0) + 1;
                    return;
                }
                if (currentCol.length > 0 && currentCol[currentCol.length-1].winner === h.winner && currentCol.length < 6) {
                    currentCol.push({winner: h.winner, tie: 0});
                } else {
                    columns.push(currentCol);
                    currentCol = [{winner: h.winner, tie: 0}];
                }
            });
            if (currentCol.length > 0) columns.push(currentCol);
            const startCol = Math.max(0, columns.length - visibleCols);
            columns.slice(startCol).forEach((col, colIdx) => {
                col.forEach((bead, rowIdx) => {
                    const x = colIdx * cell + 6, y = rowIdx * cell + 6;
                    ctx.fillStyle = bead.winner === 'B' ? '#ef4444' : '#3b82f6';
                    ctx.beginPath(); ctx.arc(x+18, y+18, 18, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(bead.winner === 'B' ? '莊' : '閒', x+18, y+27);
                    if (bead.tie > 0) {
                        ctx.fillStyle = '#22c55e'; ctx.font = 'bold 16px Arial';
                        ctx.fillText(bead.tie > 1 ? bead.tie : '和', x+18, y+42);
                    }
                });
            });
        }

        function showPrediction() {
            const predDiv = document.getElementById('prediction');
            if (history.length < 20) {
                predDiv.innerHTML = `<span style="color:#fcd34d;">需要20筆以上資料<br>目前 ${history.length} 筆</span>`;
                return;
            }
            const states = ['B','P','T'];
            const transMatrix = states.map(() => states.map(() => 0));
            for (let i = 1; i < history.length; i++) {
                transMatrix[states.indexOf(history[i-1].winner)][states.indexOf(history[i].winner)]++;
            }
            const lastIdx = states.indexOf(history[history.length-1].winner);
            const total = transMatrix[lastIdx].reduce((a,b)=>a+b,0) || 1;
            const markovProb = transMatrix[lastIdx].map(c => c/total*100);

            let multiPred = {B:0,P:0,T:0};
            for (let len = 3; len <= 20; len++) {
                if (history.length < len+1) continue;
                const lastSeq = history.slice(-len).map(h=>h.winner);
                let cand = [];
                for (let i = 0; i < history.length-len; i++) {
                    if (JSON.stringify(history.slice(i,i+len).map(h=>h.winner)) === JSON.stringify(lastSeq))
                        cand.push(history[i+len].winner);
                }
                if (cand.length) cand.forEach(c => multiPred[c] += (1/len)*cand.length);
            }
            const multiTotal = Object.values(multiPred).reduce((a,b)=>a+b,0) || 1;
            const multiProb = Object.keys(multiPred).reduce((o,k)=>{o[k]=multiPred[k]/multiTotal*100; return o;},{});

            let streak = 1, streakDir = history[history.length-1].winner;
            for (let i = history.length-2; i>=0; i--) {
                if (history[i].winner === streakDir) streak++; else break;
            }
            const streakWeight = streak > 3 ? streak/10*10 : 0;
            const bPairRate = history.filter(h=>h.bPair).length / history.length * 100 || 0;
            const pairTendProb = {B: bPairRate, P: 100-bPairRate};
            const recentStreak = streak > 5 ? 0.7 : streak > 3 ? 0.55 : 0.45;
            const jumpProb = {B: recentStreak, P: 1-recentStreak};

            let mcB = 0;
            for (let i = 0; i < 1000; i++) if (Math.random() < 0.5068) mcB++;
            const mcProb = {B: mcB/10, P: (1000-mcB)/10};

            const mW=0.25+(markovAcc-0.5)*0.7, muW=0.25+(multiAcc-0.5)*0.7,
                  sW=0.15+(streakAcc-0.5)*0.4, pW=0.15+(pairTendAcc-0.5)*0.3, jW=0.1+(jumpAcc-0.5)*0.3;

            let scoreB = markovProb[0]*mW + multiProb.B*muW + (streakDir==='B'?streakWeight:0) + pairTendProb.B*pW + jumpProb.B*jW + mcProb.B*0.1 + 20;
            let scoreP = markovProb[1]*mW + multiProb.P*muW + (streakDir==='P'?streakWeight:0) + pairTendProb.P*pW + jumpProb.P*jW + mcProb.P*0.1 + 20;

            const finalPred = scoreB >= scoreP ? 'B' : 'P';
            const maxScore = Math.max(scoreB, scoreP);
            const finalName = finalPred === 'B' ? '🟥 莊勝' : '🟦 閒勝';
            const estAcc = 50 + (maxScore - 50) / 2;
            const risk = maxScore < 58 ? '高風險 - 建議停手' : maxScore < 65 ? '中風險 - 小額試試' : '低風險 - 可跟';

            predDiv.innerHTML = `
                <div style="font-size:2.8rem;margin-bottom:15px;">${finalName}</div>
                <div style="font-size:1.8rem;color:#facc15;">自適應準率 ~${estAcc.toFixed(1)}%</div>
                <div style="margin-top:25px;font-size:1.1rem;line-height:1.8;">
                    馬可夫：莊 ${markovProb[0].toFixed(1)}% | 閒 ${markovProb[1].toFixed(1)}%<br>
                    多階序列：莊 ${multiProb.B.toFixed(1)}% | 閒 ${multiProb.P.toFixed(1)}%<br>
                    Monte Carlo：莊 ${mcProb.B.toFixed(1)}% | 閒 ${mcProb.P.toFixed(1)}%<br>
                    長龍：目前連勝 ${streak} 局<br>
                    風險評級：${risk}
                </div>`;
        }

        function updateAll() { updateHistoryList(); drawBigRoad(); showPrediction(); }

        document.getElementById('btnB').addEventListener('click', () => { history.push({winner:'B'}); saveData(); updateAll(); });
        document.getElementById('btnP').addEventListener('click', () => { history.push({winner:'P'}); saveData(); updateAll(); });
        document.getElementById('btnT').addEventListener('click', () => { history.push({winner:'T'}); saveData(); updateAll(); });
        document.getElementById('btnUndo').addEventListener('click', () => { if(history.length){history.pop(); saveData(); updateAll();} });
        document.getElementById('btnClear').addEventListener('click', () => {
            if(confirm('確定清空所有歷史？')){ history=[]; saveData(); updateAll(); }
        });

        loadData();
    </script>
</body>
</html>
